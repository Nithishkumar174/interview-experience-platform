<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        .top-bar {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;
        }

        .icon-btn {

            width: auto;

            padding: 10px 15px;

            margin-right: 10px;

            border-radius: 5px;
        }

        .actions {

            display: flex;

            gap: 10px;

            margin-top: 15px;

            flex-wrap: wrap;
        }

        #experienceFormContainer {

            display: none;

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 30px;
        }

        #filterContainer {

            display: none;

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 30px;
        }

        .ai-link {

            background: #7c3aed;

            color: white;

            padding: 10px 15px;

            border-radius: 8px;

            border: none;

            cursor: pointer;

            font-weight: bold;
        }

        .ai-link:hover {

            background: #5b21b6;
        }

    </style>

</head>

<body>

    <div class="top-bar">

        <h1>Interview Experience Dashboard</h1>

        <div class="actions">

            <button onclick="openAIProject()"
                    class="ai-link">

                🤖

            </button>

            <button onclick="toggleDarkMode()">
                🌙
            </button>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <div class="actions">

        <button class="icon-btn"
                onclick="toggleForm()">

            ➕ Add Experience

        </button>

        <button class="icon-btn"
                onclick="toggleFilter()">

            🔍 Filter

        </button>

    </div>

    <!-- FORM -->

    <div id="experienceFormContainer">

        <h2 id="formTitle">
            Add Experience
        </h2>

        <form id="experienceForm">

            <input type="hidden"
                   id="experience_id">

            <input type="text"
                   id="company_name"
                   placeholder="Company Name"
                   required>

            <input type="text"
                   id="role"
                   placeholder="Role"
                   required>

            <input type="text"
                   id="round_type"
                   placeholder="Round Type"
                   required>

            <input type="text"
                   id="difficulty"
                   placeholder="Difficulty"
                   required>

            <textarea id="experience_text"
                      placeholder="Write Experience"
                      required>
            </textarea>

            <button type="submit"
                    id="submitBtn">

                Add Experience

            </button>

        </form>

    </div>

    <!-- FILTER -->

    <div id="filterContainer">

        <h2>
            Filter Experiences
        </h2>

        <input type="text"
               id="filterCompany"
               placeholder="Filter by Company">

        <input type="text"
               id="filterRole"
               placeholder="Filter by Role">

        <input type="text"
               id="filterDifficulty"
               placeholder="Filter by Difficulty">

        <button onclick="filterExperiences()">
            Apply Filter
        </button>

    </div>

    <!-- SEARCH -->

    <input type="text"
           id="liveSearch"
           placeholder="🔎 Search Experiences..."
           onkeyup="liveSearch()">

    <h2>All Experiences</h2>

    <div id="experiences"></div>

    <script>

        // LOGIN CHECK

        if(!localStorage.getItem("token")) {

            window.location.href = "/";
        }

        // OPEN AI PROJECT

        function openAIProject() {

            window.open(
                "http://127.0.0.1:5001/",
                "_blank"
            );
        }

        // LOGOUT

        function logout() {

            localStorage.removeItem("token");

            localStorage.removeItem("username");

            window.location.href = "/";
        }

        // DARK MODE

        function toggleDarkMode() {

            document.body.classList.toggle(
                "dark-mode"
            );
        }

        // TOGGLE FORM

        function toggleForm() {

            const form =
                document.getElementById(
                    "experienceFormContainer"
                );

            form.style.display =
                form.style.display === "block"
                ? "none"
                : "block";
        }

        // TOGGLE FILTER

        function toggleFilter() {

            const filter =
                document.getElementById(
                    "filterContainer"
                );

            filter.style.display =
                filter.style.display === "block"
                ? "none"
                : "block";
        }

        // LIVE SEARCH

        function liveSearch() {

            const input =
                document.getElementById(
                    "liveSearch"
                ).value.toLowerCase();

            const cards =
                document.querySelectorAll(".card");

            cards.forEach(card => {

                card.style.display =
                    card.innerText
                    .toLowerCase()
                    .includes(input)

                    ? "block"
                    : "none";
            });
        }

        // LOAD EXPERIENCES

        async function loadExperiences(
            url="/experiences"
        ) {

            const response =
                await fetch(url);

            const data =
                await response.json();

            const container =
                document.getElementById(
                    "experiences"
                );

            container.innerHTML = "";

            data.experiences

            .sort((a, b) =>
                b.upvotes - a.upvotes
            )

            .forEach(exp => {

                container.innerHTML += `

                    <div class="card">

                        <h2>${exp.company_name}</h2>

                        <p>
                            👤 ${exp.username}
                        </p>

                        <p>
                            🕒 ${exp.created_at}
                        </p>

                        <p>
                            <b>Role:</b>
                            ${exp.role}
                        </p>

                        <p>
                            <b>Round:</b>
                            ${exp.round_type}
                        </p>

                        <p>
                            <b>Difficulty:</b>
                            ${exp.difficulty}
                        </p>

                        <p>
                            ${exp.experience_text}
                        </p>

                        <p>
                            ❤️ ${exp.upvotes || 0}
                        </p>

                        <div class="actions">

                            <button onclick="upvote(${exp.id})">

                                ❤️ Like

                            </button>

                            <button onclick="editExperience(
                                ${exp.id},
                                '${exp.company_name}',
                                '${exp.role}',
                                '${exp.round_type}',
                                '${exp.difficulty}',
                                \`${exp.experience_text}\`
                            )">

                                ✏️ Edit

                            </button>

                            <button onclick="deleteExperience(${exp.id})">

                                🗑 Delete

                            </button>

                        </div>

                    </div>
                `;
            });
        }

        // ADD / UPDATE

        document.getElementById(
            "experienceForm"
        )

        .addEventListener(
            "submit",
            async function(e) {

                e.preventDefault();

                const id =
                    document.getElementById(
                        "experience_id"
                    ).value;

                const formData =
                    new FormData();

                formData.append(
                    "company_name",
                    company_name.value
                );

                formData.append(
                    "role",
                    role.value
                );

                formData.append(
                    "round_type",
                    round_type.value
                );

                formData.append(
                    "difficulty",
                    difficulty.value
                );

                formData.append(
                    "experience_text",
                    experience_text.value
                );

                // ADD

                if(id === "") {

                    await fetch(
                        "/add_experience",
                        {
                            method: "POST",

                            headers: {
                                "Authorization":
                                `Bearer ${localStorage.getItem("token")}`
                            },

                            body: formData
                        }
                    );
                }

                // UPDATE

                else {

                    await fetch(
                        `/update_experience/${id}`,
                        {
                            method: "PATCH",

                            headers: {

                                "Content-Type":
                                "application/json",

                                "Authorization":
                                `Bearer ${localStorage.getItem("token")}`
                            },

                            body: JSON.stringify({

                                company_name:
                                company_name.value,

                                role:
                                role.value,

                                round_type:
                                round_type.value,

                                difficulty:
                                difficulty.value,

                                experience_text:
                                experience_text.value
                            })
                        }
                    );
                }

                experienceForm.reset();

                experience_id.value = "";

                loadExperiences();
            }
        );

        // EDIT

        function editExperience(
            id,
            company,
            role,
            round,
            difficulty,
            text
        ) {

            experienceFormContainer.style.display = "block";

            experience_id.value = id;

            company_name.value = company;

            role.value = role;

            round_type.value = round;

            difficulty.value = difficulty;

            experience_text.value = text;
        }

        // DELETE

        async function deleteExperience(id) {

            await fetch(
                `/delete_experience/${id}`,
                {
                    method: "DELETE",

                    headers: {
                        "Authorization":
                        `Bearer ${localStorage.getItem("token")}`
                    }
                }
            );

            loadExperiences();
        }

        // UPVOTE

        async function upvote(id) {

            await fetch(
                `/upvote/${id}`,
                {
                    method: "POST",

                    headers: {
                        "Authorization":
                        `Bearer ${localStorage.getItem("token")}`
                    }
                }
            );

            loadExperiences();
        }

        // FILTER

        function filterExperiences() {

            const company =
                filterCompany.value;

            const role =
                filterRole.value;

            const difficulty =
                filterDifficulty.value;

            const url =
                `/experiences?company=${company}&role=${role}&difficulty=${difficulty}`;

            loadExperiences(url);
        }

        // INITIAL LOAD

        loadExperiences();

    </script>

</body>

</html>
