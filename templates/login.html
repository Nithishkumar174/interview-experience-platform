<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="form-container">

        <h1>Login</h1>

        <form id="loginForm">

            <input type="email"
                   id="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   id="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have account?
            <a href="/register_page">
                Register
            </a>
        </p>

    </div>

    <script>

        document.getElementById("loginForm")
        .addEventListener(
            "submit",
            async function(e) {

                e.preventDefault();

                const formData =
                    new FormData();

                formData.append(
                    "email",
                    document.getElementById(
                        "email"
                    ).value
                );

                formData.append(
                    "password",
                    document.getElementById(
                        "password"
                    ).value
                );

                const response =
                    await fetch(
                        "/login",
                        {
                            method: "POST",

                            body: formData
                        }
                    );

                const data =
                    await response.json();

                if(data.token) {

                    localStorage.setItem(
                        "token",
                        data.token
                    );

                    localStorage.setItem(
                        "username",
                        data.username
                    );

                    alert(
                        "Login Successful"
                    );

                    window.location.href =
                        "/dashboard";
                }

                else {

                    alert(
                        "Invalid Email or Password"
                    );
                }
            }
        );

    </script>

</body>

</html>
